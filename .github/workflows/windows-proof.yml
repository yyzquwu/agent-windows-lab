name: Windows proof

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows / Python ${{ matrix.python-version }}
    runs-on: windows-2025-vs2026
    env:
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile sources
        run: python -m compileall -q scripts src tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run redacted harness
        run: python .\scripts\run_agent_windows_lab.py --out .\artifacts --redact --json

      - name: Verify redacted report
        run: python .\scripts\verify_redacted_report.py .\artifacts\agent-windows-lab-report.json

      - name: Run focused stdio repro
        run: python .\scripts\run_agent_windows_lab.py --out .\artifacts\focused-stdio --case stdio --redact --json

      - name: Verify focused redacted report
        run: python .\scripts\verify_redacted_report.py .\artifacts\focused-stdio\agent-windows-lab-report.json

      - name: Run agentic issue packet
        run: python .\scripts\run_agent_windows_lab.py --out .\artifacts\issue-packet --case mcp --case browser --case shell --issue-target modelcontextprotocol-python-sdk --json

      - name: Verify issue packet report
        run: python .\scripts\verify_redacted_report.py .\artifacts\issue-packet\agent-windows-lab-report.json

      - name: Select upstream target
        env:
          GH_TOKEN: ${{ github.token }}
        run: python .\scripts\select_upstream_target.py --out .\artifacts\target-selection --limit-per-query 2

      - name: Upload redacted evidence
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: agent-windows-lab-report-${{ matrix.python-version }}
          path: artifacts/
          if-no-files-found: error
